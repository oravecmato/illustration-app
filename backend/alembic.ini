# Alembic configuration for the Anime Illustrator backend.
#
# The database URL is NOT defined here. It is read from
# ``app.config.Settings.database_url`` inside ``alembic/env.py`` so that
# the application and migrations share a single source of truth.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Use UTC timestamps and a short slug in generated filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
